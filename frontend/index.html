<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>jarvis</title>
    <link
      rel="shortcut icon"
      href="assets/img/logo.png"
      type="image/x-icon"
    />


    <link 
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" 
    rel="stylesheet" 
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" 
    crossorigin="anonymous"
    />

    <link 
    rel="stylesheet" 
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    /> 








    <link rel="stylesheet" href="assets/vendore/textillate/animate.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <section id="Oval" class="mb-4" >
      <div class="row">
        <div class="col-md-1"></div>
        <div class="col-md-10">
          <div
            class="d-flex justify-content-center align-items-center"
            style="height: 80vh"
          >
            <canvas
              id="canvasOne"
              width="700"
              height="420"
              style="position:absolute; pointer-events:none;"
            ></canvas>
            <div id="JarvisHood">
              <div class="square">
                <span class="circle"></span>
                <span class="circle"></span>
                <span class="circle"></span>
              </div>
            </div>
          </div>
          <h4 class="text-light text-center">Ask me Anything</h4>

           <div class="col-md-12 mt-4 pt-4">
             <div class="text-center">
               <div id="TextInput" class="d-flex">
                 <input
                   type="text"
                   id="chatbox"
                   name="chatbox"
                   placeholder="Ask me anything..."
                   class="input-field"
                  />
                  <button id="SendBtn" class="glow-on-hover" hidden>
                    <i class="bi bi-send"></i>
                  </button>

                  <button id="MicBtn" class="glow-on-hover">
                    <i class="bi bi-mic"></i>
                  </button>

                  <button
                    id="ChatBtn"
                    class="glow-on-hover"
                    data-bs-toggle="offcanvas"
                    data-bs-target="#offcanvasScrolling"
                    aria-controls="offcanvasScrolling"
                  >
                   <i class="bi bi-chat-dots"></i>
                   </button> 
                  <button id="SettingBtn" class="glow-on-hover">
                    <i class="bi bi-gear"></i>
                  </button>
                </div>
              </div>
            </div>
          </div>
          <div class="col-md-1"></div>
    </div>
</section>

 <div id="SiriWave" class="mb-4">
        <div class="container">
          <div class="row">
            <div class="col-md-12">
              <div
                class="d-flex justify-content-center align-items-center"
                style="height: 100vh"
              >
                <div class="">
                  <p class="text-start text-light mb-4 siri-message">
                    Hello, I am Your Assistant
                  </p>
                  <div id="siri-container"></div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    

    <div
      class="offcanvas offcanvas-start chat-canvas"
      data-bs-scroll="true"
      data-bs-backdrop="false"
      tabindex="-1"
      id="offcanvasScrolling"
      aria-labelledby="offcanvasScrollingLabel"
    >
       <div class="offcanvas-header">
        <h5 class="offcanvas-title text-white" id="offcanvasScrollingLabel">
           Chats
        </h5>
        <button
          type="button"
          class="btn-close text-reset"
          data-bs-dismiss="offcanvas"
          aria-label="Close"
        ></button>
       </div>
       <div id="chat-canvas-body" class="offcanvas-body"></div>
    </div>

<!--Jquey-->
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.4/jquery.min.js"></script>

<!--Bootstrap-->
<script 
  src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
  integrity="sha384-pjaaA8dDz/..."
  crossorigin="anonymous">
</script>

<!--Siri wave-->
<script src="https://unpkg.com/siriwave/dist/siriwave.umd.min.js"></script>


<!-- Texllate js -->
    <script src="assets/vendore/textillate/jquery.lettering.js"></script>
    <script src="http://jschr.github.io/textillate/jquery.textillate.js"></script>

    <script type="text/javascript" src="/eel.js"></script>

    <script src="main.js"></script>
    <script src="script.js"></script>
    <script src="controller.js"></script>


</body>
</html>
